<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DocFlow AI</title>
    <meta name="description" content="Intelligent document processing powered by AI" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif; background: #f9fafb; color: #111827; }
      #root { min-height: 100vh; }
      /* Utility classes for components using Tailwind-style names */
      .max-w-7xl { max-width: 80rem; }
      .mx-auto { margin-left: auto; margin-right: auto; }
      .px-4 { padding-left: 1rem; padding-right: 1rem; }
      .py-8 { padding-top: 2rem; padding-bottom: 2rem; }
      .space-y-8 > * + * { margin-top: 2rem; }
      .grid { display: grid; }
      .grid-cols-1 { grid-template-columns: repeat(1, minmax(0, 1fr)); }
      .gap-4 { gap: 1rem; }
      .p-6 { padding: 1.5rem; }
      .rounded-xl { border-radius: 0.75rem; }
      .border { border-width: 1px; border-style: solid; }
      .border-white { border-color: white; }
      .shadow-sm { box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05); }
      .text-sm { font-size: 0.875rem; }
      .text-3xl { font-size: 1.875rem; }
      .font-medium { font-weight: 500; }
      .font-bold { font-weight: 700; }
      .mt-1 { margin-top: 0.25rem; }
      .uppercase { text-transform: uppercase; }
      .tracking-wider { letter-spacing: 0.05em; }
      .flex { display: flex; }
      .items-center { align-items: center; }
      .justify-between { justify-content: space-between; }
      .justify-center { justify-content: center; }
      .gap-2 { gap: 0.5rem; }
      .gap-3 { gap: 0.75rem; }
      .w-full { width: 100%; }
      .hidden { display: none; }
      .block { display: block; }
      .inline-flex { display: inline-flex; }
      .cursor-pointer { cursor: pointer; }
      .select-none { -webkit-user-select: none; user-select: none; }
      .overflow-hidden { overflow: hidden; }
      .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .rounded { border-radius: 0.25rem; }
      .rounded-lg { border-radius: 0.5rem; }
      .rounded-full { border-radius: 9999px; }
      .text-white { color: white; }
      .text-gray-400 { color: #9ca3af; }
      .text-gray-500 { color: #6b7280; }
      .text-gray-600 { color: #4b5563; }
      .text-gray-700 { color: #374151; }
      .text-gray-900 { color: #111827; }
      .text-blue-600 { color: #2563eb; }
      .text-green-600 { color: #16a34a; }
      .text-red-600 { color: #dc2626; }
      .text-yellow-600 { color: #ca8a04; }
      .bg-white { background-color: white; }
      .bg-gray-50 { background-color: #f9fafb; }
      .bg-gray-100 { background-color: #f3f4f6; }
      .bg-blue-50 { background-color: #eff6ff; }
      .bg-blue-600 { background-color: #2563eb; }
      .bg-green-50 { background-color: #f0fdf4; }
      .bg-red-50 { background-color: #fef2f2; }
      .bg-yellow-50 { background-color: #fefce8; }
      .hover\:bg-blue-700:hover { background-color: #1d4ed8; }
      .hover\:bg-gray-100:hover { background-color: #f3f4f6; }
      .focus\:outline-none:focus { outline: none; }
      .focus\:ring-2:focus { box-shadow: 0 0 0 2px #3b82f6; }
      .disabled\:opacity-50:disabled { opacity: 0.5; }
      .disabled\:cursor-not-allowed:disabled { cursor: not-allowed; }
      .transition { transition-property: all; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 150ms; }
      @media (min-width: 640px) { .sm\:px-6 { padding-left: 1.5rem; padding-right: 1.5rem; } }
      @media (min-width: 768px) { .md\:grid-cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); } }
      @media (min-width: 1024px) { .lg\:px-8 { padding-left: 2rem; padding-right: 2rem; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
